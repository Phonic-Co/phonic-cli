name: ci

on: [push]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  RUSTFLAGS: "-A warnings"

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Check
        run: cargo check

  compile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Compile
        run: cargo build

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Test
        run: cargo test

  publish:
    needs: [check, compile, test]
    if: github.event_name == 'push' && contains(github.ref, 'refs/tags/')
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      id-token: write
    strategy:
      # Don't cancel sibling matrix jobs on first failure — a transient
      # failure on one platform would otherwise leave npm in a partial
      # state (some platform packages published, others not, launcher
      # never published), with no clean re-run since the already-
      # published versions reject re-publish.
      fail-fast: false
      matrix:
        include:
          - rust-target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
            npm-platform-suffix: linux-x64
          - rust-target: aarch64-unknown-linux-musl
            runner: ubuntu-24.04-arm
            npm-platform-suffix: linux-arm64
          - rust-target: x86_64-apple-darwin
            runner: macos-latest
            npm-platform-suffix: darwin-x64
          - rust-target: aarch64-apple-darwin
            runner: macos-latest
            npm-platform-suffix: darwin-arm64
          - rust-target: x86_64-pc-windows-msvc
            runner: windows-latest
            npm-platform-suffix: win32-x64
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: ${{ matrix.rust-target }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          registry-url: "https://registry.npmjs.org"

      - name: Install musl build tools
        if: contains(matrix.rust-target, '-linux-musl')
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Build release binary
        shell: bash
        run: |
          if [[ "${{ matrix.rust-target }}" == *-linux-musl ]]; then
            cargo build --release --target ${{ matrix.rust-target }} \
              --no-default-features --features rustls
          else
            cargo build --release --target ${{ matrix.rust-target }}
          fi

      - name: Package and publish npm platform package
        shell: bash
        env:
          # One-time bootstrap: npm OIDC/trusted-publishing can't create a
          # package's first version, so v1 publishes with a token. Reverts to
          # OIDC on the next Fern regen (once the packages exist on npm).
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail

          VERSION="${GITHUB_REF_NAME#v}"
          PLATFORM_PKG="@phonic-ai/cli-${{ matrix.npm-platform-suffix }}"
          PKG_DIR="npm-pkg/${PLATFORM_PKG}"
          mkdir -p "${PKG_DIR}"

          # Locate the compiled binary
          BINARY_NAME="phonic"
          if [[ "${{ matrix.rust-target }}" == *"windows"* ]]; then
            BINARY_NAME="phonic.exe"
          fi
          cp "target/${{ matrix.rust-target }}/release/${BINARY_NAME}" "${PKG_DIR}/"

          # Write platform package.json
          cat > "${PKG_DIR}/package.json" <<PKGJSON
          {
            "name": "${PLATFORM_PKG}",
            "version": "${VERSION}",
            "description": "Platform-specific binary for phonic (${{ matrix.npm-platform-suffix }})",
            "repository": {
              "type": "git",
              "url": "https://github.com/Phonic-Co/phonic-cli"
            },
            "os": ["$(echo ${{ matrix.npm-platform-suffix }} | cut -d- -f1)"],
            "cpu": ["$(echo ${{ matrix.npm-platform-suffix }} | cut -d- -f2)"],
            "main": "${BINARY_NAME}",
            "files": ["${BINARY_NAME}"]
          }
          PKGJSON

          cd "${PKG_DIR}"
          publish() {  # use latest npm to ensure OIDC support
            npx -y npm@latest publish "$@"
          }
          # Pre-release detection — require the semver "-" separator so a
          # release tag like v1.0.0 for a package whose version string
          # happens to contain "alpha"/"beta" as a substring isn't
          # mis-tagged on npm.
          if [[ "${VERSION}" == *-alpha* ]]; then
            publish --access public --tag alpha
          elif [[ "${VERSION}" == *-beta* ]]; then
            publish --access public --tag beta
          else
            PKG_NAME=$(node -p "require('./package.json').name")
            PKG_VERSION=$(node -p "require('./package.json').version")
            CURRENT_LATEST=$(npm view "${PKG_NAME}" dist-tags.latest 2>/dev/null || echo "0.0.0")
            if npx -y semver@7.8.1 "${PKG_VERSION}" -r "<${CURRENT_LATEST}" > /dev/null 2>&1; then
              echo "Publishing ${PKG_VERSION} with --tag backport (current latest is ${CURRENT_LATEST})"
              publish --access public --tag backport
            else
              publish --access public
            fi
          fi

  publish-launcher:
    needs: [publish]
    if: github.event_name == 'push' && contains(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          registry-url: "https://registry.npmjs.org"

      - name: Publish launcher package
        shell: bash
        env:
          # One-time bootstrap (see platform-package step). Token auth for the
          # initial publish; the next Fern regen restores OIDC.
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail

          VERSION="${GITHUB_REF_NAME#v}"
          PKG_DIR="npm-pkg/launcher"
          mkdir -p "${PKG_DIR}"

          BINARY_NAME="phonic"

          # Build optionalDependencies map
          OPTIONAL_DEPS=""
          OPTIONAL_DEPS="${OPTIONAL_DEPS}\"@phonic-ai/cli-linux-x64\": \"${VERSION}\","
          OPTIONAL_DEPS="${OPTIONAL_DEPS}\"@phonic-ai/cli-linux-arm64\": \"${VERSION}\","
          OPTIONAL_DEPS="${OPTIONAL_DEPS}\"@phonic-ai/cli-darwin-x64\": \"${VERSION}\","
          OPTIONAL_DEPS="${OPTIONAL_DEPS}\"@phonic-ai/cli-darwin-arm64\": \"${VERSION}\","
          OPTIONAL_DEPS="${OPTIONAL_DEPS}\"@phonic-ai/cli-win32-x64\": \"${VERSION}\""

          cat > "${PKG_DIR}/package.json" <<PKGJSON
          {
            "name": "@phonic-ai/cli",
            "version": "${VERSION}",
            "description": "CLI for phonic",
            "repository": {
              "type": "git",
              "url": "https://github.com/Phonic-Co/phonic-cli"
            },
            "bin": {
              "phonic": "bin/cli.js"
            },
            "optionalDependencies": {
              ${OPTIONAL_DEPS}
            },
            "files": ["bin/"]
          }
          PKGJSON

          # Write launcher script
          mkdir -p "${PKG_DIR}/bin"
          cat > "${PKG_DIR}/bin/cli.js" <<'LAUNCHER'
          #!/usr/bin/env node
          "use strict";
          const { execFileSync } = require("child_process");
          const path = require("path");
          const os = require("os");

          const PLATFORMS = {
            "linux-x64": "@phonic-ai/cli-linux-x64",
            "linux-arm64": "@phonic-ai/cli-linux-arm64",
            "darwin-x64": "@phonic-ai/cli-darwin-x64",
            "darwin-arm64": "@phonic-ai/cli-darwin-arm64",
            "win32-x64": "@phonic-ai/cli-win32-x64",
          };

          const platformKey = os.platform() + "-" + os.arch();
          const pkg = PLATFORMS[platformKey];
          if (!pkg) {
            console.error("Unsupported platform: " + platformKey);
            process.exit(1);
          }

          const binName = os.platform() === "win32" ? "phonic.exe" : "phonic";
          const binPath = path.join(require.resolve(pkg + "/package.json"), "..", binName);

          try {
            execFileSync(binPath, process.argv.slice(2), { stdio: "inherit" });
          } catch (e) {
            if (e && typeof e === "object" && "status" in e) {
              process.exit(e.status);
            }
            throw e;
          }
          LAUNCHER

          cd "${PKG_DIR}"
          publish() {  # use latest npm to ensure OIDC support
            npx -y npm@latest publish "$@"
          }
          # Pre-release detection — require the semver "-" separator so a
          # release tag like v1.0.0 for a package whose version string
          # happens to contain "alpha"/"beta" as a substring isn't
          # mis-tagged on npm.
          if [[ "${VERSION}" == *-alpha* ]]; then
            publish --access public --tag alpha
          elif [[ "${VERSION}" == *-beta* ]]; then
            publish --access public --tag beta
          else
            PKG_NAME=$(node -p "require('./package.json').name")
            PKG_VERSION=$(node -p "require('./package.json').version")
            CURRENT_LATEST=$(npm view "${PKG_NAME}" dist-tags.latest 2>/dev/null || echo "0.0.0")
            if npx -y semver@7.8.1 "${PKG_VERSION}" -r "<${CURRENT_LATEST}" > /dev/null 2>&1; then
              echo "Publishing ${PKG_VERSION} with --tag backport (current latest is ${CURRENT_LATEST})"
              publish --access public --tag backport
            else
              publish --access public
            fi
          fi
